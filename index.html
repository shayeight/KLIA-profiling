<style>  
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');  
      
    :root {  
        --primary: #2563eb;  
        --success: #10b981;  
        --warning: #f59e0b;  
        --danger: #ef4444;  
    }  


    body {   
        font-family: 'Plus Jakarta Sans', sans-serif;   
        background-color: #f1f5f9;  
        overscroll-behavior-y: contain;  
        -webkit-user-select: none;

    .status-active { border-left: 6px solid var(--success); }  
    .status-surveillance { border-left: 6px solid var(--warning); }  
    .status-custody { border-left: 6px solid var(--primary); }  
    .status-inactive { border-left: 6px solid #94a3b8; }  


    /* Peta & Navigasi Touch */  
    #mapViewport {  
        width: 100vw;  
        height: calc(100vh - 64px);  
        overflow: hidden;  
        touch-action: none;  
        background: #cbd5e1;  
        position: relative;  
    }  


    #mapCanvas {  
        position: absolute;  
        transform-origin: 0 0;  
        will-change: transform;  
        width: 4000px;  
        height: 4000px;  
    }  


    .line-connection {  
        stroke: #475569; stroke-width: 2.5; fill: none;  
        stroke-dasharray: 8; animation: dash 12s linear infinite;  
    }  


    @keyframes dash { to { stroke-dashoffset: -160; } }  


    /* Performance & Print */  
    .no-scrollbar::-webkit-scrollbar { display: none; }  
      
    @media print {  
        .no-print { display: none !important; }

    }  


    /* Toast UI */  
    #toast {  
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);

    }  
</style>

                    <input type="text" id="pName" placeholder="NAMA PENUH" required class="w-full p-4 bg-slate-100 rounded-2xl font-bold text-xs outline-none uppercase focus:ring-2 focus:ring-blue-500">

                </div>  
                <button type="button" onclick="addFlight()" class="w-full mt-3 bg-blue-600 py-3 rounded-xl text-[10px] font-black uppercase tracking-widest active:scale-95">TAMBAH REKOD TERBANG</button>

            <button type="submit" id="saveBtn" class="w-full bg-slate-950 text-white py-6 rounded-[35px] font-black shadow-2xl uppercase tracking-[0.2em] active:scale-95 transition-all">SIMPAN PROFIL</button>

<!-- Navigation Bawah -->  
<nav class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-950/95 backdrop-blur-2xl px-12 py-5 rounded-full shadow-2xl flex items-center gap-16 z-[150] no-print border border-white/10">  
    <button onclick="switchTo('list')" class="text-blue-500 font-black text-[10px] uppercase tracking-wider" id="navL">Senarai</button>  
    <button onclick="toggleForm()" class="bg-blue-600 w-16 h-16 flex items-center justify-center rounded-full -mt-20 border-[8px] border-slate-950 shadow-2xl text-white font-black text-2xl active:scale-90 transition-all">✚</button>  
    <button onclick="switchTo('map')" class="text-white opacity-40 font-black text-[10px] uppercase tracking-wider" id="navM">Peta</button>  
</nav>  


<script>  
      // --- DATA ENGINE ---  
const APP_PASSWORD = "intel123";


if(localStorage.getItem("z_login") === "ok"){
    document.getElementById("loginScreen").style.display="none";
}


function loginApp(){


    const pass = document.getElementById("loginPass").value;


    if(pass === APP_PASSWORD){


    localStorage.setItem("z_login","ok");


    document.getElementById("loginScreen").style.display="none";


    notify("Akses Dibenarkan");


    }else{


        document.getElementById("loginMsg").classList.remove("hidden");


    }


}
 
    const STORE_KEY = 'z_intel_v9_master_stable';  
    let suspects = JSON.parse(localStorage.getItem(STORE_KEY)) || [];  
    let curF = [];  
    let map = { s: 0.8, x: 0, y: 0 };  
    let pointers = new Map();  


    function notify(m) {  
        const t = document.getElementById("toast");  
        t.innerText = m; t.style.opacity = "1"; t.style.transform = "translateX(-50%) scale(1)";  
        setTimeout(() => { t.style.opacity = "0"; t.style.transform = "translateX(-50%) scale(0.9)"; }, 2500);  
    }  


    function loader(show) { document.getElementById('globalLoader').style.display = show ? 'flex' : 'none'; }  


    function saveDB() {  
        try {  
            localStorage.setItem(STORE_KEY, JSON.stringify(suspects));  
            renderAll();  
        } catch(e) {  
            alert("Ralat Storan: Memori telefon anda penuh. Sila padam profil yang tidak diperlukan.");  
        }  
    }  


    // --- IMAGE ENGINE (COMPRESSION IS KEY) ---  
    async function processImage(input) {  
        const file = input.files[0]; if(!file) return;  
        loader(true);  
        const reader = new FileReader();  
        reader.onload = e => {  
            const img = new Image();  
            img.onload = () => {  
                const canvas = document.createElement('canvas');  
                const MAX = 350; // Smaller width for mobile efficiency  
                let w = img.width, h = img.height;  
                if(w > h) { if(w > MAX){ h *= MAX/w; w = MAX; } }  
                else { if(h > MAX){ w *= MAX/h; h = MAX; } }  
                canvas.width = w; canvas.height = h;  
                const ctx = canvas.getContext('2d');  
                ctx.drawImage(img, 0, 0, w, h);  
                const base64 = canvas.toDataURL('image/jpeg', 0.4); // 40% quality = Very small file size  
                document.getElementById('photoData').value = base64;  
                document.getElementById('imgPre').src = base64;  
                document.getElementById('imgPre').classList.remove('hidden');  
                document.getElementById('imgIcon').classList.add('hidden');  
                loader(false);  
            };  
            img.src = e.target.result;  
        };  
        reader.readAsDataURL(file);  
    }  


    // --- FORM & DATA ---  
    function toggleForm() {  
        const el = document.getElementById('formOverlay');  
        el.classList.toggle('hidden');  
        if(!el.classList.contains('hidden')) {  
            const currentSyn = document.getElementById('pSyn').value.toUpperCase();  
            populateLeaders(currentSyn);  
        } else {  
            document.getElementById('pForm').reset();  
            document.getElementById('editId').value = '';  
            document.getElementById('photoData').value = '';  
            document.getElementById('imgPre').classList.add('hidden');  
            document.getElementById('imgIcon').classList.remove('hidden');  
            curF = []; renderFormFlights();  
        }  
    }  


    function addFlight() {  
        const no = document.getElementById('fNo').value.toUpperCase();  
        const air = document.getElementById('fAir').value;  
        // For simple HP entry, we'll use a prompt for time if needed or just use current  
        const time = prompt("Sila sahkan Tarikh/Masa (YYYY-MM-DD HH:MM):", new Date().toISOString().slice(0,16).replace('T', ' '));  
        if(!no || !time) return;  
        curF.push({ id: Date.now(), no, air, time: new Date(time).toISOString() });  
        document.getElementById('fNo').value = ''; renderFormFlights();  
    }  


    function renderFormFlights() {  
        const c = document.getElementById('formFlightList');  
        c.innerHTML = curF.map(f => `<div class="bg-white/5 p-2 rounded-lg flex justify-between text-[9px] border border-white/10"><span>✈️ ${f.no} (${f.air}) - ${new Date(f.time).toLocaleString()}</span><button type="button" onclick="curF=curF.filter(x=>x.id!=${f.id});renderFormFlights();" class="text-red-500 font-black">X</button></div>`).join('');  
    }  


    function populateLeaders(syn) {  
        const sel = document.getElementById('pLeader');  
        const eId = document.getElementById('editId').value;  
        sel.innerHTML = '<option value="">-- TIADA / INDEPENDENT --</option>';  
        suspects.filter(t => t.id !== eId && t.syndicateName === syn).forEach(t => {  
            sel.innerHTML += `<option value="${t.id}">${t.name}</option>`;  
        });  
    }  


    document.getElementById('pForm').addEventListener('submit', e => {  
        e.preventDefault();  
        loader(true);  
          
        // Critical fix for Save Function  
        setTimeout(() => {  
            const id = document.getElementById('editId').value || Date.now().toString();  
            const data = {
    id,
    syndicateName: document.getElementById('pSyn').value.trim().toUpperCase(),
    name: document.getElementById('pName').value.trim().toUpperCase(),
    ic: document.getElementById('pIc').value,
    status: document.getElementById('pStatus').value,
    role: document.getElementById('pRole').value,
    leaderId: document.getElementById('pLeader').value,
    modus: document.getElementById('pMo').value,
    flights: [...curF],
    phone: document.getElementById('pTel').value,
    vehicle: document.getElementById('pPlat').value,
    photo: document.getElementById('photoData').value,
    ts: new Date().toISOString()
};


            const idx = suspects.findIndex(t => t.id === id);  
            if(idx > -1) suspects[idx] = data; else suspects.unshift(data);  


            saveDB();  
            loader(false);  
            toggleForm();  
            notify("Profil Disimpan.");  
        }, 300);  
    });  


    // --- MAP ENGINE (v9.0 HYBRID) ---  
    function switchTo(v) {  
        document.getElementById('mainView').classList.toggle('hidden', v === 'map');  
        document.getElementById('mapView').classList.toggle('hidden', v !== 'map');  
        document.getElementById('navM').classList.toggle('opacity-40', v !== 'map');  
        document.getElementById('navM').classList.toggle('text-blue-500', v === 'map');  
        document.getElementById('navL').classList.toggle('opacity-40', v === 'map');  
        document.getElementById('navL').classList.toggle('text-blue-500', v !== 'map');  
        if(v === 'map') renderMap(); else renderList();  
    }  


    function renderMap() {  
        const canvas = document.getElementById('mapCanvas');  
        const filter = document.getElementById('synFilter').value;  
        canvas.innerHTML = '';  
        document.getElementById('mapStatus').innerText = filter || 'Semua Rangkaian';  
          
        const filtered = filter ? suspects.filter(t => t.syndicateName === filter) : suspects;  
        const roots = filtered.filter(t => !t.leaderId || !filtered.some(f => f.id == t.leaderId));  


        const drawNode = (s, x, y) => {  
            const node = document.createElement('div');  
            node.className = `absolute bg-white rounded-[30px] p-4 shadow-2xl border-4 ${s.status==='Aktif'?'border-green-500':'border-slate-300'} w-48 text-center`;  
            node.style.left = `${x}px`; node.style.top = `${y}px`; node.id = `node-${s.id}`;  
            node.onclick = () => editTarget(s.id);  
            node.innerHTML = `<span class="bg-yellow-400 text-[7px] font-black px-2 py-0.5 rounded uppercase mb-1 inline-block">${s.syndicateName}</span><p class="text-[10px] font-black uppercase truncate">${s.name}</p><p class="text-[8px] font-bold text-slate-400 uppercase">${s.role}</p>`;  
            canvas.appendChild(node);  
            const kids = filtered.filter(c => c.leaderId == s.id);  
            if(kids.length > 0) {  
                const sp = 280; let stX = x - ((kids.length-1)*sp)/2;  
                kids.forEach((c, i) => drawNode(c, stX + (i*sp), y + 220));  
            }  
        };  


        roots.forEach((r, i) => drawNode(r, 800 + (i*1000), 100));  
        setTimeout(drawMapLines, 100);  
        resetMap();  
    }  


    function drawMapLines() {  
        const svg = document.getElementById('svgLines'); svg.innerHTML = '';  
        const filter = document.getElementById('synFilter').value;  
        const filtered = filter ? suspects.filter(t => t.syndicateName === filter) : suspects;  
        filtered.forEach(t => {  
            if(t.leaderId) {  
                const from = document.getElementById(`node-${t.leaderId}`);  
                const to = document.getElementById(`node-${t.id}`);  
                if(from && to) {  
                    const fr = from.getBoundingClientRect(), tr = to.getBoundingClientRect();  
                    const vr = document.getElementById('mapViewport').getBoundingClientRect();  
                    const x1 = (fr.left + fr.width/2 - vr.left) / map.s - map.x/map.s;  
                    const y1 = (fr.top + fr.height - vr.top) / map.s - map.y/map.s;  
                    const x2 = (tr.left + tr.width/2 - vr.left) / map.s - map.x/map.s;  
                    const y2 = (tr.top - vr.top) / map.s - map.y/map.s;  
                    const p = document.createElementNS("http://www.w3.org/2000/svg", "path");  
                    p.setAttribute("d", `M ${x1} ${y1} C ${x1} ${y1+60}, ${x2} ${y2-60}, ${x2} ${y2}`);  
                    p.setAttribute("class", "line-connection"); svg.appendChild(p);  
                }  
            }  
        });  
    }  


    // --- POINTER EVENT ENGINE (ADVANCED HP ZOOM) ---  
    const vp = document.getElementById('mapViewport');  
    const canv = document.getElementById('mapCanvas');  


    vp.addEventListener('pointerdown', e => {  
        pointers.set(e.pointerId, e);  
        if(pointers.size === 1) { vp.style.cursor = 'grabbing'; }  
    });  


    vp.addEventListener('pointermove', e => {  
        if(!pointers.has(e.pointerId)) return;  
        const prev = pointers.get(e.pointerId);  
        pointers.set(e.pointerId, e);  


        if(pointers.size === 1) {  
            map.x += e.clientX - prev.clientX;  
            map.y += e.clientY - prev.clientY;  
        } else if(pointers.size === 2) {  
            const pts = Array.from(pointers.values());  
            const d1 = Math.hypot(pts[0].clientX - pts[1].clientX, pts[0].clientY - pts[1].clientY);  
            const d2 = Math.hypot(prev.clientX - pts[1].clientX, prev.clientY - pts[1].clientY);  
            if(d2 > 0) map.s = Math.min(2, Math.max(0.1, map.s * (d1 / d2)));  
        }  
        updateMap();  
    });  


    vp.addEventListener('pointerup', e => { pointers.delete(e.pointerId); if(pointers.size < 1) vp.style.cursor = 'grab'; });  
    vp.addEventListener('pointercancel', e => pointers.delete(e.pointerId));  


    function updateMap() { canv.style.transform = `translate(${map.x}px, ${map.y}px) scale(${map.s})`; drawMapLines(); }  
    function zoomBtn(v) { map.s = Math.min(2, Math.max(0.1, map.s * v)); updateMap(); }  
    function resetMap() { map.s = 0.5; map.x = 20; map.y = 20; updateMap(); }  


    // --- EXPORT & BACKUP (ANTI-FREEZE) ---  
    function exportData() {  
        loader(true);  
        setTimeout(() => {  
            const blob = new Blob([JSON.stringify(suspects)], { type: 'application/json' });  
            const url = URL.createObjectURL(blob);  
            const a = document.createElement('a'); a.href = url;  
            a.download = `ZPRO_BACKUP_${new Date().toISOString().slice(0,10)}.json`; a.click();  
            loader(false); notify("Backup Selesai.");  
        }, 500);  
    }  


    function importData(inp) {  
        const f = inp.files[0]; if(!f) return;  
        const r = new FileReader();  
        r.onload = e => { suspects = JSON.parse(e.target.result); saveDB(); notify("Data Dipulihkan."); };  
        r.readAsText(f);  
    }  


    // --- REPORTING ---  
    function generateReport() {  
        const f = document.getElementById('synFilter').value;  
        const filtered = f ? suspects.filter(t => t.syndicateName === f) : suspects;  
        if(filtered.length === 0) return alert("Tiada data.");  


        loader(true);  
        setTimeout(() => {  
            const overlay = document.getElementById('reportOverlay');  
            const area = document.getElementById('reportArea');  
            overlay.classList.remove('hidden');  
              
            area.innerHTML = `  
                <div class="border-b-[10px] border-slate-950 pb-8 mb-12">  
                    <h1 class="text-5xl font-black uppercase text-slate-900 leading-none tracking-tighter">Case Intel Dossier</h1>  
                    <p class="text-sm font-bold text-slate-400 mt-4 uppercase tracking-[0.3em]">SULIT & RASMI v9.0</p>  
                </div>  
                <div class="space-y-10">  
                    ${filtered.map(t => `  
                        <div class="report-card border-2 border-slate-100 p-10 rounded-[40px] bg-white">  
                            <div class="flex gap-10 border-b pb-8 mb-8">  
                                <div class="h-32 w-32 bg-slate-50 rounded-[35px] overflow-hidden border shadow-xl flex-shrink-0">  
                                    ${t.photo ? `<img src="${t.photo}" class="w-full h-full object-cover">` : '<div class="w-full h-full flex items-center justify-center text-slate-200">👤</div>'}  
                                </div>  
                                <div class="flex-1">  
                                    <h2 class="text-3xl font-black uppercase text-slate-900 leading-tight">${t.name}</h2>  
                                    <div class="flex gap-2 mt-3">  
                                        <span class="bg-yellow-400 text-yellow-950 px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest">${t.syndicateName}</span>  
                                        <span class="bg-slate-950 text-white px-3 py-1 rounded-lg text-[10px] font-black uppercase">${t.status}</span>  
                                    </div>  
                                    <p class="text-[11px] font-bold text-slate-400 mt-5 uppercase">ID PENGENALAN: ${t.ic||'N/A'}</p>  
                                </div>  
                            </div>  
                            <div class="grid grid-cols-2 gap-12 text-[11px] font-bold uppercase tracking-tight">  
                                <div>  
                                    <p class="text-blue-600 mb-2 font-black uppercase tracking-widest text-[9px]">Analisis Modus Operandi</p>  
                                    <p class="bg-slate-50 p-6 rounded-[30px] normal-case font-medium italic text-slate-700 leading-relaxed border">"${t.modus || 'Tiada strategi direkodkan.'}"</p>  
                                </div>  
                                <div>  
                                    <p class="text-slate-950 underline mb-4 text-[10px] font-black uppercase">Garis Masa Pergerakan Udara</p>  
                                    <div class="space-y-3 border-l-2 pl-6 border-slate-100">  
                                        ${(t.flights||[]).map(fh=>`  
                                            <div class="relative">  
                                                <div class="absolute -left-[31px] top-1.5 h-2.5 w-2.5 rounded-full bg-slate-300"></div>  
                                                <p class="font-black text-slate-800 uppercase">${fh.no} • ${fh.air}</p>  
                                                <p class="text-slate-400 italic">${new Date(fh.time).toLocaleString('ms-MY')}</p>  
                                            </div>  
                                        `).join('') || '<p class="text-slate-300 normal-case">Tiada rekod dikesan.</p>'}  
                                    </div>  
                                </div>  
                            </div>  
                        </div>  
                    `).join('')}  
                </div>  
            `;  
            loader(false);  
        }, 600);  
    }  


    function closeReport() { document.getElementById('reportOverlay').classList.add('hidden'); }  


    // --- RENDER LIST ---  
    function renderList() {  
        const list = document.getElementById('listView');  
        const search = document.getElementById('searchBox').value.toLowerCase();  
        const filter = document.getElementById('synFilter').value;  
        const now = new Date();  


        const filtered = suspects.filter(t => 
    ((t.name || "").toLowerCase().includes(search) ||
    (t.ic || "").toLowerCase().includes(search) ||
    (t.phone || "").toLowerCase().includes(search) ||
    (t.vehicle || "").toLowerCase().includes(search)) &&
    (filter === "" || t.syndicateName === filter)
);
        document.getElementById('countTotal').innerText = suspects.length;  


        const imminent = suspects.filter(t => (t.flights || []).some(f => {  
            const diff = (new Date(f.time) - now) / (1000*60*60); return diff > 0 && diff <= 24;  
        }));  
        document.getElementById('countAir').innerText = imminent.length;  


        if(imminent.length > 0) {  
            document.getElementById('airWatchlist').classList.remove('hidden');  
            document.getElementById('watchlistContainer').innerHTML = imminent.map(t => `<div class="bg-red-700 text-white p-4 rounded-[25px] flex justify-between items-center shadow-lg"><p class="text-[11px] font-black uppercase truncate">${t.name}</p><button onclick="editTarget('${t.id}')" class="bg-white text-red-700 px-4 py-1.5 rounded-xl text-[10px] font-black">EDIT</button></div>`).join('');  
        } else document.getElementById('airWatchlist').classList.add('hidden');  


        if(filtered.length === 0) { document.getElementById('emptyMsg').classList.remove('hidden'); list.innerHTML = ''; return; }  
        document.getElementById('emptyMsg').classList.add('hidden');  


        list.innerHTML = filtered.map(t => {  
            const isAlert = (t.flights || []).some(f => { const diff = (new Date(f.time) - now) / (1000*60*60); return diff > 0 && diff <= 24; });  
            const latest = (t.flights || []).sort((a,b) => new Date(b.time) - new Date(a.time))[0];  
            return `<div class="bg-white rounded-[40px] p-8 shadow-sm border ${t.status==='Aktif'?'status-active':'status-surveillance'} relative overflow-hidden transition-all ${isAlert?'flight-alert':''} active:scale-95">  
                <div class="flex gap-4 mb-4">  
                    ${t.photo ? `<img src="${t.photo}" class="h-16 w-16 rounded-2xl object-cover shadow-lg border">` : `<div class="h-16 w-16 bg-slate-100 rounded-2xl flex items-center justify-center text-slate-300">👤</div>`}  
                    <div class="flex-1 min-w-0">  
                        <span class="bg-yellow-400 text-[8px] font-black px-2 py-0.5 rounded uppercase mb-1 inline-block shadow-sm">${t.syndicateName}</span>  
                        <h3 class="font-black text-slate-800 uppercase text-xs truncate leading-none mt-1">${t.name}</h3>  
                        <p class="text-[8px] font-bold text-slate-400 uppercase mt-1 tracking-tight">${t.role} • ${t.ic||'ID N/A'}</p>  
                    </div>  
                </div>  
                ${latest ? `<div class="bg-slate-950 p-2.5 rounded-xl text-white mb-4 flex justify-between items-center"><p class="text-[9px] font-black text-blue-400 uppercase">✈️ ${latest.no}</p><p class="text-[8px] opacity-60 uppercase">${new Date(latest.time).toLocaleDateString()}</p></div>` : ''}  
                <div class="text-[10px] text-slate-500 bg-slate-50 p-3 rounded-2xl mb-4 italic line-clamp-2 border border-slate-100">${t.modus || 'Tiada MO direkodkan.'}</div>  
                <div class="flex justify-between items-center pt-3 border-t">  
                    <span class="text-[8px] font-black opacity-30 uppercase">${new Date(t.ts).toLocaleDateString()}</span>  
                    <div class="flex gap-2">  
                         <button onclick="editTarget('${t.id}')" class="p-2.5 bg-blue-50 text-blue-600 rounded-xl font-bold text-[10px] active:bg-blue-600 active:text-white uppercase transition-colors">Edit</button>  
                         <button onclick="deleteTarget('${t.id}')" class="p-2.5 bg-red-50 text-red-500 rounded-xl font-bold text-[10px] active:bg-red-600 active:text-white uppercase transition-colors">Padam</button>  
                    </div>  
                </div>  
            </div>`;  
        }).join('');  
    }  


    function renderAll() {  
        const sel = document.getElementById('synFilter'); const tag = document.getElementById('synTags');  
        const syns = [...new Set(suspects.map(t => t.syndicateName))].sort();  
        sel.innerHTML = '<option value="">SEMUA GENG</option>';  
        tag.innerHTML = '';  
        syns.forEach(s => { if(!s) return; sel.innerHTML += `<option value="${s}">${s}</option>`; tag.innerHTML += `<button onclick="setSyn('${s}')" class="px-5 py-2 bg-white border rounded-full text-[9px] font-black uppercase whitespace-nowrap shadow-sm active:bg-blue-600 active:text-white">${s}</button>`; });  
        renderList();  
    }  


    function setSyn(v) { document.getElementById('synFilter').value = v; renderAll(); }  


    function editTarget(id) {  
        const t = suspects.find(x => x.id == id); if(!t) return;  
        if(document.getElementById('reportOverlay').classList.contains('hidden') === false) closeReport();  
        toggleForm();  
        document.getElementById('editId').value = t.id;  
        document.getElementById('pSyn').value = t.syndicateName;  
        document.getElementById('pName').value = t.name;  
        document.getElementById('pIc').value = t.ic || '';  
        document.getElementById('pStatus').value = t.status;  
        document.getElementById('pRole').value = t.role;  
        document.getElementById('pMo').value = t.modus || '';  


        document.getElementById('pTel').value = t.phone || '';


document.getElementById('pPlat').value = t.vehicle || '';
        curF = t.flights || []; renderFormFlights();  
        if(t.photo) {  
            document.getElementById('photoData').value = t.photo;  
            document.getElementById('imgPre').src = t.photo;  
            document.getElementById('imgPre').classList.remove('hidden');  
            document.getElementById('imgIcon').classList.add('hidden');  
        }  
        populateLeaders(t.syndicateName);  
        document.getElementById('pLeader').value = t.leaderId || "";  
    }  


    function deleteTarget(id) { if(confirm("Padam saspek?")) { suspects = suspects.filter(x => x.id != id); saveDB(); notify("Terpadam."); } }  


    // Start  
    renderAll();  
    setInterval(renderList, 60000);  
    window.addEventListener('resize', () => { if(!document.getElementById('mapView').classList.contains('hidden')) drawMapLines(); });  


function logoutApp(){
    localStorage.removeItem("z_login");
    location.reload();
}
</script>
