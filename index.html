<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <title>Z-PROFILE v7.0 | STABLE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        /* Status Borders */
        .status-active { border-left: 6px solid #10b981; }
        .status-surveillance { border-left: 6px solid #f59e0b; }
        .status-custody { border-left: 6px solid #3b82f6; }
        .status-inactive { border-left: 6px solid #94a3b8; }


        /* Animation Alert */
        .flight-alert { animation: pulse-red 2s infinite; border: 2px solid #ef4444; }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }


        /* Map System */
        #mapViewport {
            touch-action: none;
            overflow: hidden;
            background: #f8fafc;
            position: relative;
            width: 100%;
            height: 100%;
        }
        #mapCanvas {
            transform-origin: 0 0;
            cursor: grab;
            position: absolute;
            top: 0; left: 0;
            width: 5000px; height: 5000px;
        }
        .line-connection {
            stroke: #94a3b8; stroke-width: 2; fill: none;
            stroke-dasharray: 6; animation: dash 10s linear infinite;
        }
        @keyframes dash { to { stroke-dashoffset: -120; } }


        /* General UI */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; }
            #reportView { display: block !important; position: static !important; width: 100% !important; }
            .report-card { border: 1px solid #e2e8f0 !important; break-inside: avoid; margin-bottom: 20px; border-radius: 12px; page-break-inside: avoid; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 overflow-x-hidden">


    <!-- Toast Notification -->
    <div id="toast" class="fixed top-10 left-1/2 -translate-x-1/2 z-[500] bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl opacity-0 pointer-events-none transition-all duration-300 font-bold text-xs text-center min-w-[200px]"></div>


    <!-- Loading -->
    <div id="loader" class="fixed inset-0 z-[600] bg-white/80 backdrop-blur-sm hidden items-center justify-center flex-col">
        <div class="w-12 h-12 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 text-[10px] font-black uppercase tracking-widest text-slate-600">Memproses Data...</p>
    </div>


    <!-- Header -->
    <header class="bg-slate-950 text-white p-4 sticky top-0 z-[100] no-print border-b border-white/5">
        <div class="flex justify-between items-center max-w-7xl mx-auto">
            <div onclick="location.reload()" class="cursor-pointer">
                <h1 class="text-xl font-extrabold italic tracking-tighter uppercase">Z-PROFILE <span class="text-blue-500">v7.0</span></h1>
            </div>
            <div class="flex gap-2">
                <select id="synFilter" onchange="renderAll()" class="bg-slate-900 text-[9px] font-bold px-2 py-1.5 rounded-lg border-none outline-none focus:ring-1 focus:ring-blue-500 text-white w-24">
                    <option value="">SEMUA GENAS</option>
                </select>
                <button onclick="exportData()" class="bg-slate-800 p-2 rounded-lg text-[10px] font-black">💾</button>
            </div>
        </div>
    </header>


    <!-- MAIN APP CONTENT -->
    <div id="mainView" class="no-print pb-32">
        
        <!-- Dashboard -->
        <section class="p-4 grid grid-cols-2 md:grid-cols-4 gap-3 max-w-7xl mx-auto">
            <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-200">
                <p class="text-slate-400 text-[8px] font-bold uppercase tracking-widest">Saspek</p>
                <p class="text-2xl font-black" id="statTotal">0</p>
            </div>
            <div class="bg-slate-900 p-4 rounded-3xl shadow-xl text-white">
                <p class="text-blue-400 text-[8px] font-bold uppercase tracking-widest italic">Terbang (24j)</p>
                <p class="text-2xl font-black" id="statFlights">0</p>
            </div>
            <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-200 cursor-pointer active:bg-slate-50" onclick="generateReport()">
                <p class="text-red-600 text-[8px] font-bold uppercase tracking-widest">Laporan</p>
                <p class="text-[10px] font-black mt-1 uppercase">CETAK PDF →</p>
            </div>
            <div class="bg-white p-4 rounded-3xl shadow-sm border border-slate-200">
                <label class="cursor-pointer">
                    <p class="text-blue-600 text-[8px] font-bold uppercase tracking-widest">Muat Data</p>
                    <p class="text-[10px] font-black mt-1 uppercase">IMPORT JSON</p>
                    <input type="file" id="importInp" accept=".json" class="hidden" onchange="importData(this)">
                </label>
            </div>
        </section>


        <!-- Search -->
        <div class="px-4 mb-6 max-w-7xl mx-auto">
            <input type="text" id="searchBox" oninput="renderList()" placeholder="Cari nama, IC, flight, atau MO..." class="w-full p-4 rounded-2xl border-none shadow-xl focus:ring-2 focus:ring-blue-500 outline-none text-sm font-semibold">
            <div id="synTags" class="flex gap-2 overflow-x-auto no-scrollbar mt-3"></div>
        </div>


        <!-- Alert Flight -->
        <div id="flightAlerts" class="px-4 mb-6 hidden space-y-2 max-w-7xl mx-auto">
            <h4 class="text-[9px] font-black text-red-600 uppercase tracking-widest flex items-center gap-2">
                <span class="w-2 h-2 rounded-full bg-red-600 animate-ping"></span> Watchlist Penerbangan
            </h4>
            <div id="alertContainer" class="space-y-2"></div>
        </div>


        <!-- Suspect Cards Grid -->
        <main id="listView" class="px-4 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 max-w-7xl mx-auto"></main>
        
        <div id="emptyState" class="hidden text-center py-20 text-slate-300 font-black uppercase text-xs">Pangkalan Data Kosong</div>
    </div>


    <!-- MAP VIEW -->
    <div id="mapView" class="hidden fixed inset-0 top-[64px] z-[90] no-print">
        <div id="mapViewport">
            <svg id="svgLines" class="absolute inset-0 w-full h-full pointer-events-none z-10"></svg>
            <div id="mapCanvas"></div>
            
            <!-- Map Controls -->
            <div class="absolute top-4 left-4 z-[100] bg-white/90 p-4 rounded-3xl shadow-2xl border border-white max-w-[150px]">
                <p class="text-[8px] font-black text-slate-400 uppercase">Peta Rangkaian</p>
                <p class="text-[10px] font-black uppercase truncate" id="mapStatus">Aktif</p>
                <div class="flex gap-2 mt-3">
                    <button onclick="adjustZoom(1.2)" class="bg-slate-100 w-8 h-8 rounded-lg font-bold">+</button>
                    <button onclick="adjustZoom(0.8)" class="bg-slate-100 w-8 h-8 rounded-lg font-bold">-</button>
                    <button onclick="resetMapTransform()" class="bg-slate-900 text-white px-2 rounded-lg text-[8px] font-bold">RESET</button>
                </div>
            </div>
        </div>
    </div>


    <!-- REPORT VIEW (Overlay) -->
    <div id="reportOverlay" class="hidden fixed inset-0 z-[200] bg-white overflow-y-auto p-6 no-scrollbar">
        <div class="max-w-4xl mx-auto">
            <div class="flex justify-between items-center mb-8 no-print border-b pb-4">
                <button onclick="closeReport()" class="bg-slate-100 px-4 py-2 rounded-xl text-xs font-black">KEMBALI</button>
                <button onclick="window.print()" class="bg-blue-600 text-white px-6 py-2 rounded-xl text-xs font-black shadow-lg">CETAK PDF</button>
            </div>
            <div id="reportContent"></div>
        </div>
    </div>


    <!-- FORM MODAL -->
    <div id="formOverlay" class="fixed inset-0 bg-slate-950/95 backdrop-blur-xl z-[200] hidden items-center justify-center p-4 overflow-y-auto no-scrollbar">
        <div class="bg-white rounded-[40px] w-full max-w-xl p-6 md:p-10 shadow-2xl my-auto">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-black uppercase" id="formTitle">Profil Saspek</h2>
                <button onclick="toggleForm()" class="text-slate-300 text-3xl font-light">&times;</button>
            </div>
            <form id="profileForm" class="space-y-4">
                <input type="hidden" id="editId">
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="relative rounded-3xl aspect-square bg-slate-50 border-2 border-dashed border-slate-200 flex items-center justify-center overflow-hidden">
                        <img id="imgPre" class="hidden absolute inset-0 w-full h-full object-cover rounded-3xl">
                        <div id="imgIcon" class="text-slate-300 text-4xl">👤</div>
                        <input type="file" id="imgInput" accept="image/*" class="hidden" onchange="handleImageFile(this)">
                        <label for="imgInput" class="absolute bottom-2 bg-slate-900 text-white px-3 py-1.5 rounded-xl text-[8px] font-black uppercase cursor-pointer">Kamera</label>
                        <input type="hidden" id="photoData">
                    </div>
                    <div class="md:col-span-2 space-y-3">
                        <input type="text" id="pSyn" placeholder="SINDIKET / GENG" required class="w-full p-3 bg-yellow-50 rounded-xl font-black text-xs border border-yellow-100 outline-none uppercase">
                        <input type="text" id="pName" placeholder="NAMA PENUH" required class="w-full p-3 bg-slate-100 rounded-xl font-bold text-xs outline-none uppercase">
                        <input type="text" id="pIc" placeholder="NO. IC / PASPORT" class="w-full p-3 bg-slate-100 rounded-xl text-xs font-bold outline-none uppercase">
                    </div>
                </div>


                <div class="grid grid-cols-2 gap-3">
                    <div class="space-y-1">
                        <label class="text-[8px] font-black text-slate-400 ml-1 uppercase">Peranan</label>
                        <select id="pRole" class="w-full p-3 bg-slate-100 rounded-xl text-xs font-bold outline-none uppercase">
                            <option>Ketua</option><option>Orang Kanan</option><option>Runner</option><option>Money Mule</option><option>Logistik</option><option>Informan</option>
                        </select>
                    </div>
                    <div class="space-y-1">
                        <label class="text-[8px] font-black text-slate-400 ml-1 uppercase">Status</label>
                        <select id="pStatus" class="w-full p-3 bg-slate-100 rounded-xl text-xs font-bold outline-none uppercase">
                            <option>Aktif</option><option>Surveillance</option><option>Custody</option><option>Inactive</option>
                        </select>
                    </div>
                </div>


                <div class="space-y-1">
                    <label class="text-[8px] font-black text-indigo-600 ml-1 uppercase">Ketua Atasan (Link Chart)</label>
                    <select id="pLeader" class="w-full p-3 bg-indigo-50 rounded-xl text-xs font-bold outline-none border border-indigo-100 uppercase">
                        <option value="">-- TIADA / INDEPENDENT --</option>
                    </select>
                </div>


                <textarea id="pMo" rows="2" class="w-full p-4 bg-blue-50 rounded-2xl text-xs font-medium outline-none border border-blue-100" placeholder="Huraikan Modus Operandi (Cara Kerja)..."></textarea>
                
                <!-- Flight Manager -->
                <div class="bg-slate-900 p-5 rounded-3xl text-white">
                    <p class="text-[9px] font-black text-blue-400 uppercase mb-3">Watchlist Pergerakan Udara</p>
                    <div id="formFlightList" class="space-y-2 mb-3 max-h-32 overflow-y-auto no-scrollbar"></div>
                    <div class="grid grid-cols-2 gap-2">
                        <input type="text" id="fNo" placeholder="No. Flight" class="p-2.5 bg-slate-800 rounded-xl text-xs uppercase font-bold text-white outline-none">
                        <select id="fAir" class="p-2.5 bg-slate-800 rounded-xl text-[10px] font-bold text-white outline-none">
                            <option value="">Airport</option><option>KLIA1</option><option>KLIA2</option><option>PEN</option><option>BKI</option><option>KCH</option>
                        </select>
                    </div>
                    <div class="flex gap-2 mt-2">
                        <input type="datetime-local" id="fTime" class="flex-1 p-2.5 bg-slate-800 rounded-xl text-[10px] font-bold text-white outline-none">
                        <button type="button" onclick="addFlight()" class="bg-blue-600 px-6 rounded-xl text-[10px] font-black uppercase">Rekod</button>
                    </div>
                </div>


                <div class="grid grid-cols-2 gap-3">
                    <input type="text" id="pVehicle" placeholder="PLAT KERETA" class="p-3 bg-slate-100 rounded-xl text-xs font-bold outline-none uppercase">
                    <input type="text" id="pPhone" placeholder="TELEFON" class="p-3 bg-slate-100 rounded-xl text-xs font-bold outline-none uppercase">
                </div>


                <button type="submit" class="w-full bg-slate-950 text-white py-5 rounded-[25px] font-black shadow-2xl uppercase tracking-widest active:scale-95">SIMPAN PROFIL</button>
            </form>
        </div>
    </div>


    <!-- Bottom Nav -->
    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-950/95 backdrop-blur-xl px-12 py-5 rounded-full shadow-2xl flex items-center gap-16 z-[150] no-print border border-white/10">
        <button onclick="switchTo('list')" class="text-white flex flex-col items-center gap-1 group"><span class="text-[10px] font-black uppercase" id="navList">Senarai</span></button>
        <button onclick="toggleForm()" class="bg-blue-600 p-4 rounded-full -mt-20 shadow-2xl border-[10px] border-slate-950 active:scale-90 transition-all font-black text-white text-xl">✚</button>
        <button onclick="switchTo('map')" class="text-white flex flex-col items-center gap-1 group opacity-40" id="navMapBtn"><span class="text-[10px] font-black uppercase">Rangkaian</span></button>
    </nav>


    <script>
        // --- KONFIGURASI DATA ---
        const DB = 'z_profile_v7_final';
        let targets = JSON.parse(localStorage.getItem(DB)) || [];
        let tempFlights = [];
        let currentMode = 'list';
        
        // Transform State Peta
        let mapScale = 1;
        let mapPosX = 0;
        let mapPosY = 0;


        function notify(msg) {
            const t = document.getElementById("toast");
            t.innerText = msg; t.style.opacity = "1";
            setTimeout(() => t.style.opacity = "0", 3000);
        }


        function showLoader(show) { document.getElementById('loader').style.display = show ? 'flex' : 'none'; }


        function saveDB() {
            try {
                localStorage.setItem(DB, JSON.stringify(targets));
                renderAll();
            } catch(e) { alert("Ralat: Memori telefon penuh. Sila padam data tidak perlu."); }
        }


        // --- ENJIN MAMPATAN GAMBAR (PENTING UNTUK HP) ---
        async function handleImageFile(input) {
            const file = input.files[0];
            if(!file) return;
            showLoader(true);
            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 300; // Kecilkan saiz untuk jimat memori
                    let width = img.width; let height = img.height;
                    if(width > height) { if(width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } }
                    else { if(height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                    canvas.width = width; canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    const base64 = canvas.toDataURL('image/jpeg', 0.6); // 60% kualiti
                    document.getElementById('photoData').value = base64;
                    document.getElementById('imgPre').src = base64;
                    document.getElementById('imgPre').classList.remove('hidden');
                    document.getElementById('imgIcon').classList.add('hidden');
                    showLoader(false);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }


        function clearImage() {
            document.getElementById('photoData').value = '';
            document.getElementById('imgPre').classList.add('hidden');
            document.getElementById('imgIcon').classList.remove('hidden');
            document.getElementById('imgInput').value = '';
        }


        // --- FORM & DATA ---
        function toggleForm() {
            const el = document.getElementById('formOverlay');
            el.classList.toggle('hidden');
            if(!el.classList.contains('hidden')) {
                populateAtasan();
            } else {
                document.getElementById('profileForm').reset();
                document.getElementById('editId').value = '';
                tempFlights = [];
                clearImage();
            }
        }


        function addFlight() {
            const no = document.getElementById('fNo').value.toUpperCase();
            const air = document.getElementById('fAir').value;
            const time = document.getElementById('fTime').value;
            if(!no || !time) return notify("Isi info terbang.");
            tempFlights.push({ id: Date.now(), no, air, time });
            document.getElementById('fNo').value = ''; document.getElementById('fTime').value = '';
            renderTempFlights();
        }


        function renderTempFlights() {
            const cont = document.getElementById('formFlightList');
            cont.innerHTML = tempFlights.map(f => `
                <div class="flex justify-between items-center bg-white/10 p-2 rounded-lg text-[9px]">
                    <p class="font-bold uppercase tracking-tight">${f.no} • ${f.air} • ${new Date(f.time).toLocaleString()}</p>
                    <button type="button" onclick="tempFlights=tempFlights.filter(x=>x.id!=${f.id});renderTempFlights();" class="text-red-400 font-bold ml-2">PADAM</button>
                </div>
            `).join('');
        }


        function populateAtasan() {
            const select = document.getElementById('pLeader');
            const editId = document.getElementById('editId').value;
            const currentSyn = document.getElementById('pSyn').value.toUpperCase();
            select.innerHTML = '<option value="">-- TIADA / INDEPENDENT --</option>';
            targets.filter(t => t.id !== editId && t.syndicateName === currentSyn).forEach(t => {
                select.innerHTML += `<option value="${t.id}">${t.name}</option>`;
            });
        }


        document.getElementById('profileForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const id = document.getElementById('editId').value || Date.now().toString();
            const data = {
                id,
                syndicateName: document.getElementById('pSyn').value.trim().toUpperCase(),
                name: document.getElementById('pName').value.trim().toUpperCase(),
                kpt: document.getElementById('pIc').value,
                status: document.getElementById('pStatus').value,
                role: document.getElementById('pRole').value,
                leaderId: document.getElementById('pLeader').value,
                modusOperandi: document.getElementById('pMo').value.trim(),
                flightHistory: [...tempFlights],
                phone: document.getElementById('pPhone').value,
                vehicle: document.getElementById('pVehicle').value,
                photo: document.getElementById('photoData').value,
                timestamp: new Date().toISOString()
            };


            const idx = targets.findIndex(t => t.id === id);
            if(idx > -1) targets[idx] = data; else targets.unshift(data);
            
            saveDB(); toggleForm(); notify("Profil Disimpan.");
        });


        // --- RANGKAIAN (MAP) ENGINE - TOUCH OPTIMIZED ---
        function switchTo(mode) {
            currentMode = mode;
            document.getElementById('appContainer').classList.toggle('hidden', mode === 'map');
            document.getElementById('mapView').classList.toggle('hidden', mode !== 'map');
            document.getElementById('navMapBtn').classList.toggle('opacity-40', mode !== 'map');
            document.getElementById('navList').parentElement.classList.toggle('opacity-40', mode === 'map');
            if(mode === 'map') renderMap();
            else renderList();
        }


        function renderMap() {
            const can = document.getElementById('mapCanvas');
            const filter = document.getElementById('synFilter').value;
            can.innerHTML = '';
            document.getElementById('mapStatus').innerText = filter || 'Semua Rangkaian';
            
            const filtered = filter ? targets.filter(t => t.syndicateName === filter) : targets;
            const roots = filtered.filter(t => !t.leaderId || !filtered.some(f => f.id == t.leaderId));


            const drawNode = (sus, x, y) => {
                const node = document.createElement('div');
                node.className = `absolute bg-white rounded-2xl p-3 shadow-xl border-4 ${sus.status==='Aktif'?'border-green-500':'border-slate-300'} w-48 text-center active:scale-95 transition-transform`;
                node.style.left = `${x}px`; node.style.top = `${y}px`; node.id = `node-${sus.id}`;
                node.onclick = () => editTarget(sus.id);
                node.innerHTML = `
                    <span class="text-[7px] font-black bg-yellow-400 px-2 py-0.5 rounded uppercase mb-1 inline-block">${sus.syndicateName}</span>
                    <p class="text-[9px] font-black uppercase truncate">${sus.name}</p>
                    <p class="text-[7px] font-bold text-slate-400 uppercase">${sus.role}</p>
                `;
                can.appendChild(node);
                const children = filtered.filter(c => c.leaderId == sus.id);
                if(children.length > 0) {
                    const sp = 260; let startX = x - ((children.length-1)*sp)/2;
                    children.forEach((c, i) => drawNode(c, startX + (i*sp), y + 220));
                }
            };


            roots.forEach((root, i) => drawNode(root, 600 + (i*900), 100));
            setTimeout(drawMapLines, 100);
            resetMapTransform();
        }


        function drawMapLines() {
            const svg = document.getElementById('svgLines');
            svg.innerHTML = '';
            const filter = document.getElementById('synFilter').value;
            const filtered = filter ? targets.filter(t => t.syndicateName === filter) : targets;


            filtered.forEach(t => {
                if(t.leaderId) {
                    const from = document.getElementById(`node-${t.leaderId}`);
                    const to = document.getElementById(`node-${t.id}`);
                    if(from && to) {
                        const fromR = from.getBoundingClientRect(); const toR = to.getBoundingClientRect();
                        const vpR = document.getElementById('mapViewport').getBoundingClientRect();
                        
                        const x1 = (fromR.left + fromR.width/2 - vpR.left) / mapScale - mapPosX/mapScale;
                        const y1 = (fromR.top + fromR.height - vpR.top) / mapScale - mapPosY/mapScale;
                        const x2 = (toR.left + toR.width/2 - vpR.left) / mapScale - mapPosX/mapScale;
                        const y2 = (toR.top - vpR.top) / mapScale - mapPosY/mapScale;


                        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                        path.setAttribute("d", `M ${x1} ${y1} C ${x1} ${y1+60}, ${x2} ${y2-60}, ${x2} ${y2}`);
                        path.setAttribute("class", "line-connection"); svg.appendChild(path);
                    }
                }
            });
        }


        // --- TOUCH INTERACTION ---
        const vp = document.getElementById('mapViewport');
        const canvas = document.getElementById('mapCanvas');
        let initialDist = 0;
        let isDragging = false;
        let lastTouch = { x: 0, y: 0 };


        vp.addEventListener('touchstart', e => {
            if(e.touches.length === 1) {
                isDragging = true;
                lastTouch = { x: e.touches[0].clientX - mapPosX, y: e.touches[0].clientY - mapPosY };
            }
            if(e.touches.length === 2) {
                initialDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            }
        });


        vp.addEventListener('touchmove', e => {
            if(isDragging && e.touches.length === 1) {
                mapPosX = e.touches[0].clientX - lastTouch.x;
                mapPosY = e.touches[0].clientY - lastTouch.y;
            }
            if(e.touches.length === 2) {
                const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
                const zoomFactor = dist / initialDist;
                mapScale = Math.min(2, Math.max(0.2, mapScale * zoomFactor));
                initialDist = dist;
            }
            updateMap();
        });


        vp.addEventListener('touchend', () => isDragging = false);


        function updateMap() {
            canvas.style.transform = `translate(${mapPosX}px, ${mapPosY}px) scale(${mapScale})`;
            drawMapLines();
        }


        function adjustZoom(v) { mapScale = Math.min(2, Math.max(0.2, mapScale * v)); updateMap(); }
        function resetMapTransform() { mapScale = 0.6; mapPosX = 20; mapPosY = 20; updateMap(); }


        // --- REPORTING ---
        function generateReport() {
            const filter = document.getElementById('synFilter').value;
            const filtered = filter ? targets.filter(t => t.syndicateName === filter) : targets;
            if(filtered.length === 0) return notify("Tiada data.");


            showLoader(true);
            setTimeout(() => {
                const area = document.getElementById('reportContent');
                document.getElementById('reportOverlay').classList.remove('hidden');
                
                area.innerHTML = `
                    <div class="mb-10 border-b-8 border-slate-900 pb-6">
                        <h1 class="text-4xl font-black uppercase text-slate-900 leading-tight">Intelligence Dossier</h1>
                        <p class="text-xs font-bold text-slate-400 mt-2 uppercase tracking-widest">SULIT: RINGKASAN SINDIKET v7.0</p>
                    </div>
                    <div class="grid grid-cols-2 gap-4 mb-10">
                        <div class="p-6 bg-slate-50 rounded-3xl border uppercase font-bold text-[10px]">Total Profil: ${filtered.length}</div>
                        <div class="p-6 bg-slate-50 rounded-3xl border uppercase font-bold text-[10px]">Tarikh: ${new Date().toLocaleDateString()}</div>
                    </div>
                    <div class="space-y-6">
                        ${filtered.map(t => `
                            <div class="report-card p-8 border bg-white flex flex-col md:flex-row gap-8">
                                <div class="w-32 h-32 bg-slate-100 rounded-2xl overflow-hidden border shadow-sm shrink-0">
                                    ${t.photo ? `<img src="${t.photo}" class="w-full h-full object-cover">` : ''}
                                </div>
                                <div class="flex-1">
                                    <div class="flex justify-between border-b pb-2 mb-4 uppercase">
                                        <h2 class="text-xl font-black text-slate-800">${t.name}</h2>
                                        <span class="font-black text-blue-600 text-xs">${t.status}</span>
                                    </div>
                                    <div class="grid grid-cols-2 gap-4 text-[10px] font-bold uppercase mb-4">
                                        <p><span class="text-slate-400 italic mr-2">Role:</span> ${t.role}</p>
                                        <p><span class="text-slate-400 italic mr-2">Geng:</span> ${t.syndicateName}</p>
                                        <p><span class="text-slate-400 italic mr-2">IC:</span> ${t.kpt || 'N/A'}</p>
                                        <p><span class="text-slate-400 italic mr-2">Tel:</span> ${t.phone || '-'}</p>
                                    </div>
                                    <div class="p-4 bg-slate-50 rounded-xl text-[10px] font-medium italic border border-slate-100 mb-4">
                                        <strong>MO:</strong> ${t.modusOperandi || 'Tiada rekod MO.'}
                                    </div>
                                    <div class="text-[9px] uppercase">
                                        <p class="font-black text-slate-400 mb-2">Sejarah Penerbangan:</p>
                                        <div class="space-y-1">
                                            ${(t.flightHistory || []).map(f => `<p>• ${f.no} (${f.air}) - ${new Date(f.time).toLocaleDateString()}</p>`).join('') || 'TIADA REKOD'}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
                showLoader(false);
            }, 600);
        }


        function closeReport() { document.getElementById('reportOverlay').classList.add('hidden'); }


        // --- BACKUP & SYNC ---
        function exportData() {
            showLoader(true);
            setTimeout(() => {
                const blob = new Blob([JSON.stringify(targets)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url;
                a.download = `Z_PRO_BACKUP_${new Date().toISOString().slice(0,10)}.json`; a.click();
                showLoader(false); notify("Backup JSON Berjaya.");
            }, 500);
        }


        function importData(input) {
            const file = input.files[0]; if(!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                try {
                    const data = JSON.parse(e.target.result);
                    if(Array.isArray(data)) { targets = data; saveDB(); notify("Data Dipulihkan!"); }
                } catch(e) { notify("Ralat fail JSON."); }
            };
            reader.readAsText(file);
        }


        // --- RENDER LIST ---
        function renderList() {
            const list = document.getElementById('listView');
            const search = document.getElementById('searchBox').value.toLowerCase();
            const filter = document.getElementById('synFilter').value;
            const filtered = targets.filter(t => (t.name.toLowerCase().includes(search) || t.kpt.includes(search)) && (filter==="" || t.syndicateName===filter));


            document.getElementById('statTotal').innerText = targets.length;
            
            const now = new Date();
            const imminent = targets.filter(t => (t.flightHistory || []).some(f => {
                const diff = (new Date(f.time) - now) / (1000*60*60); return diff > 0 && diff <= 24;
            }));
            document.getElementById('statFlights').innerText = imminent.length;


            if(imminent.length > 0) {
                document.getElementById('flightAlerts').classList.remove('hidden');
                document.getElementById('alertContainer').innerHTML = imminent.map(t => `<div class="bg-red-700 text-white p-3 rounded-2xl flex justify-between items-center shadow-lg"><p class="text-[10px] font-black uppercase truncate">${t.name}</p><button onclick="editTarget('${t.id}')" class="bg-white text-red-700 px-3 py-1 rounded-lg text-[9px] font-black uppercase">Detail</button></div>`).join('');
            } else document.getElementById('flightAlerts').classList.add('hidden');


            if(filtered.length === 0) { document.getElementById('emptyState').classList.remove('hidden'); list.innerHTML = ''; return; }
            document.getElementById('emptyState').classList.add('hidden');


            list.innerHTML = filtered.map(t => {
                const latest = (t.flightHistory || []).sort((a,b) => new Date(b.time) - new Date(a.time))[0];
                return `<div class="bg-white rounded-[40px] p-6 shadow-sm border ${t.status==='Aktif'?'status-active':'status-surveillance'} relative overflow-hidden transition-all active:scale-95">
                    <div class="flex gap-4 mb-4">
                        ${t.photo ? `<img src="${t.photo}" class="w-16 h-16 rounded-2xl object-cover shadow-lg border">` : `<div class="w-16 h-16 bg-slate-100 rounded-2xl flex items-center justify-center text-slate-300 text-xl">👤</div>`}
                        <div class="flex-1 min-w-0">
                            <span class="inline-block text-[8px] font-black bg-yellow-400 text-yellow-900 px-2 py-0.5 rounded uppercase mb-1">${t.syndicateName}</span>
                            <h3 class="font-black text-slate-800 uppercase text-xs truncate leading-none">${t.name}</h3>
                            <p class="text-[9px] font-bold text-slate-400 uppercase mt-1 tracking-tighter">${t.role} • ${t.kpt||'ID N/A'}</p>
                        </div>
                    </div>
                    ${latest ? `<div class="bg-slate-950 p-2 rounded-xl text-white mb-3 text-[9px] font-black uppercase tracking-tighter flex justify-between"><span>✈️ ${latest.no}</span><span class="opacity-50">${new Date(latest.time).toLocaleDateString()}</span></div>` : ''}
                    <div class="text-[10px] text-slate-500 bg-slate-50 p-3 rounded-2xl mb-4 italic line-clamp-2 border">${t.modusOperandi || 'Tiada MO.'}</div>
                    <div class="flex justify-between items-center pt-3 border-t">
                        <span class="text-[8px] font-black opacity-30">${new Date(t.timestamp).toLocaleDateString()}</span>
                        <div class="flex gap-2">
                             <button onclick="editTarget('${t.id}')" class="p-2 bg-blue-50 text-blue-600 rounded-lg font-bold text-[9px] uppercase">Edit</button>
                             <button onclick="deleteTarget('${t.id}')" class="p-2 bg-red-50 text-red-500 rounded-lg font-bold text-[9px] uppercase">Padam</button>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }


        function renderAll() {
            const sel = document.getElementById('synFilter'); const tag = document.getElementById('synTags');
            const syns = [...new Set(targets.map(t => t.syndicateName))].sort();
            sel.innerHTML = '<option value="">SEMUA GENG</option>';
            tag.innerHTML = `<button onclick="setSyn('')" class="px-4 py-1.5 rounded-full text-[9px] font-black uppercase whitespace-nowrap bg-blue-600 text-white shadow-lg">Semua</button>`;
            syns.forEach(s => { if(!s) return; sel.innerHTML += `<option value="${s}">${s}</option>`; tag.innerHTML += `<button onclick="setSyn('${s}')" class="px-4 py-1.5 rounded-full text-[9px] font-black uppercase whitespace-nowrap bg-white text-slate-400 border">${s}</button>`; });
            if(currentMode === 'map') renderMap(); else renderList();
        }


        function setSyn(v) { document.getElementById('synFilter').value = v; renderAll(); }


        // Mula Aplikasi
        renderAll();
        setupTouchMap();
        setInterval(renderList, 60000);
        window.addEventListener('resize', () => { if(currentMode==='map') drawMapLines(); });
    </script>
</body>
</html>
